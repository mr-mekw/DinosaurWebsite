<!DOCTYPE html>
<html lang="en-US">
<head>
    <title>Dinosaur Game Final</title>
    <meta charset="UTF-8">
    <meta name="description" content="Final project for Dinosaur Evolution and Extinction @ CCC">
    <meta name="author" content="Colton Murray">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Style.css">
</head>
<body>
    <h1>Dino or DiNot?</h1>
    <h6>Game by Colton Murray</h6>


    <button class="button" id="start-button"  onclick="startFunction()">Start Game</button>
    <button class="button" id="credit-button"  onclick="document.getElementById('question').innerHTML='You clicked the credit button'">Credits</button>

    <div id="game-container" > <!-- style="display:none;" -->
        <p id="question"></p>
        <br> <br>
        <button id="dino-button">Dino</button>
        <br>
        <button id="dinot-button">DiNot</button>
        <p id="score"></p>
    </div>

    <div id="credit-panel" style="display: none;">
        <p>TESTING</p>
    </div>

    <div id="scoreboard" >
        <!-- Make a table with the current scoreboard -->
         <table id="score-table">
            <caption>Scoreboard:</caption>
            <tr>
                <th>Rank</th>
                <th>Player</th>
                <th>Score</th>
            </tr>
            <tr>
                <td>1</td>
                <td>Anon</td>
                <td>1500</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Jen</td>
                <td>1495</td>
            </tr>
            <tr>
                <td>3</td>
                <td>Hank</td>
                <td>1450</td>
            </tr>
            <tr>
                <td>4</td>
                <td>Anne</td>
                <td>1375</td>
            </tr>
            <tr>
                <td>5</td>
                <td>John</td>
                <td>1200</td>
            </tr>
         </table>
    </div>

    <script src="Script.js"></script>
</body>
</html>
