    <script>
        // because I'm expecting to do this the same way I did the game jam

        // set up classes for each specimen & add dino boolean
        // create a function that checks the boolean against which button is pressed & returns win if they match & lose if they don't
        // create a function that expands/changes visibility of a text box that holds help info
        // create a function that randomly chooses a different gamescreen html to show when replay button is pressed


        var points = 0;
        var currentDino = "TRex";
        


        // function that checks which html you're on & go to the next one - to be used by the click commands


        document.getElementById("Dino_button").addEventListener('click', function() {
            // if (current html's dino bool == true){
            //     change iframe src -> win.html
            // } else {
            //     change ifram src -> lose.html
            // }

            if (currentDino == "TRex") {
                document.getElementById("gamePort").src="gamescreens/Win.html";
                points++;
                document.getElementById("score").textContent = "Score: " + points;
            } else {
                document.getElementById("gamePort").src="gamescreens/Lose.html";
            }
        });

        document.getElementById("Dinot_button").addEventListener('click', function() {
            // if (current html's dino bool == false) {
            //     change iframe src -> lose.hmtml
            // } else {
            //     change iframe src -> win.html
            // }
            if (currentDino == "Pterosaur" || currentDino == "Mososaur") {
                document.getElementById("gamePort").src="gamescreens/Win.html";
                points++;
                document.getElementById("score").textContent = "Score: " + points;
            } else {
                document.getElementById("gamePort").src="gamescreens/Lose.html";
            }
        });

        document.getElementById("next").addEventListener('click', function() {
            if (currentDino == "TRex") {
                document.getElementById("gamePort").src="gamescreens/Pterosaur.html";
                currentDino = "Pterosaur";
            } else if (currentDino == "Pterosaur") {
                document.getElementById("gamePort").src="gamescreens/Mososaur.html";
                currentDino = "Mososaur";
            } else {
                document.getElementById("gamePort").src="gamescreens/TRex.html";
                currentDino = "TRex"
            }
        });

    </script>
